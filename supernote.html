<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔记本</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.min.css" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --sb-bg:#19191d;--sb-hover:#252529;--sb-active:#2e2e34;--sb-border:#2a2a30;
  --sb-text:#9e9ea6;--sb-dim:#5c5c66;--sb-surface:#222226;
  --ed-bg:#faf9f7;--ed-surface:#fff;--ed-border:#e8e6e2;
  --ed-text:#2c2c2e;--ed-text2:#8e8e92;--ed-ph:#c5c3be;
  --accent:#c4875a;--accent-h:#a87040;--accent-sub:rgba(196,135,90,.08);--accent-glow:rgba(196,135,90,.15);
  --tag-bg:#f0ece7;--danger:#c75050;--danger-sub:rgba(199,80,80,.08);
  --success:#4a9e6a;--success-sub:rgba(74,158,106,.08);
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;
  --sh-sm:0 1px 3px rgba(0,0,0,.04);--sh-md:0 4px 16px rgba(0,0,0,.06);
  --sh-lg:0 8px 32px rgba(0,0,0,.08);--sh-xl:0 16px 48px rgba(0,0,0,.12);
  --tr:.2s cubic-bezier(.4,0,.2,1)
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--ed-bg);color:var(--ed-text);height:100vh;overflow:hidden;display:flex;-webkit-font-smoothing:antialiased}

/* ====== 侧边栏 ====== */
.sidebar{width:280px;min-width:280px;background:var(--sb-bg);display:flex;flex-direction:column;border-right:1px solid var(--sb-border);position:relative;z-index:10}
.resize-handle{position:absolute;right:-3px;top:0;bottom:0;width:6px;cursor:col-resize;z-index:11}
.resize-handle:hover{background:var(--accent);opacity:.2;border-radius:3px}

.sb-header{padding:18px 18px 14px;display:flex;align-items:center;gap:10px}
.sb-logo{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),#d4a574);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC',serif;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.sb-title{font-size:15px;font-weight:600;color:#e8e8ea;letter-spacing:.3px}

.sb-search{margin:0 14px 12px;position:relative}
.sb-search input{width:100%;height:32px;background:var(--sb-hover);border:1px solid transparent;border-radius:var(--r-sm);padding:0 10px 0 32px;font-size:12.5px;color:#c8c8cc;outline:none;transition:var(--tr);font-family:inherit}
.sb-search input::placeholder{color:var(--sb-dim)}
.sb-search input:focus{border-color:var(--accent);background:var(--sb-active)}
.sb-search .s-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--sb-dim);font-size:13px}
.sb-search .s-kbd{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:9.5px;color:var(--sb-dim);background:var(--sb-bg);padding:2px 5px;border-radius:3px;border:1px solid var(--sb-border)}

/* ---- 知识库列表视图 ---- */
.kb-list-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
.kb-list-head{padding:0 16px 10px;display:flex;align-items:center;justify-content:space-between}
.kb-list-title{font-size:11px;font-weight:600;color:var(--sb-dim);text-transform:uppercase;letter-spacing:1px}
.kb-new-btn{height:26px;padding:0 10px;background:transparent;border:1px dashed var(--sb-border);border-radius:var(--r-sm);color:var(--sb-dim);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:var(--tr);font-family:inherit}
.kb-new-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.kb-new-btn i{font-size:12px}

.kb-grid{flex:1;overflow-y:auto;padding:0 12px 12px;display:flex;flex-direction:column;gap:6px;scrollbar-width:thin;scrollbar-color:var(--sb-border) transparent}
.kb-grid::-webkit-scrollbar{width:4px}
.kb-grid::-webkit-scrollbar-thumb{background:var(--sb-border);border-radius:2px}

.kb-card{display:flex;align-items:center;gap:12px;padding:14px 14px;border-radius:var(--r-md);cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.kb-card:hover{background:var(--sb-hover)}
.kb-card:active{background:var(--sb-active)}
.kb-card-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;opacity:.6;transition:opacity .2s}
.kb-card:hover .kb-card-bar{opacity:1}
.kb-card-icon{width:38px;height:38px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0;transition:transform .2s}
.kb-card:hover .kb-card-icon{transform:scale(1.06)}
.kb-card-info{flex:1;min-width:0}
.kb-card-name{font-size:13.5px;font-weight:600;color:#dddde0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kb-card-meta{font-size:11px;color:var(--sb-dim);margin-top:2px;display:flex;align-items:center;gap:6px}
.kb-card-meta span{display:flex;align-items:center;gap:3px}
.kb-card-meta i{font-size:11px}
.kb-card-arrow{color:var(--sb-dim);font-size:14px;opacity:0;transform:translateX(-4px);transition:var(--tr)}
.kb-card:hover .kb-card-arrow{opacity:.6;transform:translateX(0)}

.kb-card-inline{padding:6px 12px}
.kb-card-inline input{width:100%;padding:7px 10px;background:var(--sb-bg);border:1px solid var(--accent);border-radius:var(--r-sm);color:#e0e0e2;font-size:13px;outline:none;font-family:inherit}

.kb-list-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--sb-dim)}
.kb-list-empty i{font-size:32px;opacity:.25;margin-bottom:10px}
.kb-list-empty p{font-size:12px;line-height:1.6;text-align:center}

/* ---- 知识库内部视图（目录树） ---- */
.kb-tree-view{flex:1;display:flex;flex-direction:column;overflow:hidden;display:none}
.kb-tree-view.active{display:flex}

.kb-tree-head{padding:0 14px 10px}
.kb-back-btn{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;color:var(--sb-text);font-size:12.5px;transition:var(--tr);border:none;background:none;font-family:inherit;width:100%}
.kb-back-btn:hover{background:var(--sb-hover);color:#d0d0d2}
.kb-back-btn i{font-size:14px}
.kb-back-btn .back-arrow{transition:transform .2s}
.kb-back-btn:hover .back-arrow{transform:translateX(-2px)}

.kb-tree-name{display:flex;align-items:center;gap:10px;padding:6px 10px 10px}
.kb-tree-icon{width:32px;height:32px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0}
.kb-tree-label{font-size:14px;font-weight:700;color:#e8e8ea;letter-spacing:-.2px}
.kb-tree-desc{font-size:11px;color:var(--sb-dim);margin-top:1px}

.kb-tree-sep{height:1px;background:var(--sb-border);margin:0 14px 8px}

/* 目录树 */
.sb-tree{flex:1;overflow-y:auto;padding:2px 8px;scrollbar-width:thin;scrollbar-color:var(--sb-border) transparent}
.sb-tree::-webkit-scrollbar{width:4px}
.sb-tree::-webkit-scrollbar-thumb{background:var(--sb-border);border-radius:2px}

.tree-empty{text-align:center;padding:36px 12px;color:var(--sb-dim)}
.tree-empty i{font-size:26px;display:block;margin-bottom:8px;opacity:.3}
.tree-empty p{font-size:12px;line-height:1.6}

.tree-item{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--r-sm);cursor:pointer;transition:background .12s;user-select:none;position:relative}
.tree-item:hover{background:var(--sb-hover)}
.tree-item.active{background:var(--sb-active)}
.tree-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:14px;background:var(--accent);border-radius:0 3px 3px 0}
.tree-chev{font-size:11px;color:var(--sb-dim);transition:transform .2s;flex-shrink:0;width:14px;text-align:center}
.tree-chev.open{transform:rotate(90deg)}
.tree-chev.hidden{visibility:hidden}
.tree-ico{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.tree-ico.dir{color:var(--accent);opacity:.7}
.tree-ico.doc{color:var(--sb-dim)}
.tree-item.active .tree-ico.doc{color:var(--accent);opacity:.8}
.tree-lbl{flex:1;font-size:12.5px;color:var(--sb-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-item.active .tree-lbl{color:#dcdce0}
.tree-cnt{font-size:10px;color:var(--sb-dim);background:var(--sb-bg);padding:1px 6px;border-radius:8px;flex-shrink:0}
.tree-ch{overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.4,0,.2,1);padding-left:14px}
.tree-ch.open{max-height:2000px}

.tree-inline-input{width:100%;padding:4px 8px;background:var(--sb-bg);border:1px solid var(--accent);border-radius:4px;color:#e0e0e2;font-size:12.5px;outline:none;font-family:inherit}

/* 底部 */
.sb-bottom{border-top:1px solid var(--sb-border);margin-top:0}
.sb-actions{padding:10px 14px;display:flex;gap:6px}
.sb-btn{flex:1;height:28px;background:transparent;border:1px dashed var(--sb-border);border-radius:var(--r-sm);color:var(--sb-dim);font-size:11.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:var(--tr);font-family:inherit}
.sb-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.sb-btn i{font-size:12px}
.sb-btn.hidden{display:none}

.sb-footer{padding:10px 14px;display:flex;align-items:center;gap:10px}
.user-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#5a7a6a,#3d5a4e);display:flex;align-items:center;justify-content:center;font-size:10px;color:#c8ddd2;font-weight:600;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:11.5px;color:#c8c8cc;font-weight:500}
.user-status{font-size:10px;color:var(--sb-dim)}
.ft-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);color:var(--sb-dim);cursor:pointer;transition:var(--tr);font-size:13px;background:none;border:none}
.ft-btn:hover{background:var(--sb-hover);color:#c8c8cc}

/* ====== 主区域 ====== */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.tab-bar{height:40px;min-height:40px;background:var(--ed-surface);border-bottom:1px solid var(--ed-border);display:flex;align-items:stretch;padding:0 4px;gap:1px;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:5px;padding:0 13px;font-size:12px;color:var(--ed-text2);cursor:pointer;border-bottom:2px solid transparent;transition:var(--tr);white-space:nowrap;user-select:none}
.tab:hover{color:var(--ed-text);background:var(--accent-sub)}
.tab.active{color:var(--ed-text);border-bottom-color:var(--accent)}
.tab .t-icon{font-size:12px;opacity:.5}
.tab.active .t-icon{opacity:.8;color:var(--accent)}
.tab .t-close{width:15px;height:15px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-size:11px;opacity:0;transition:var(--tr);margin-left:2px;color:var(--ed-text2);background:none;border:none;cursor:pointer}
.tab:hover .t-close{opacity:.6}
.tab .t-close:hover{opacity:1;background:rgba(0,0,0,.06)}
.tab .t-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-left:3px;flex-shrink:0}

.toolbar{height:38px;min-height:38px;background:var(--ed-surface);border-bottom:1px solid var(--ed-border);display:flex;align-items:center;padding:0 18px;gap:2px}
.tb-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);border:none;background:none;color:var(--ed-text2);cursor:pointer;transition:var(--tr);font-size:13px}
.tb-btn:hover{background:var(--tag-bg);color:var(--ed-text)}
.tb-btn.active{background:var(--accent-sub);color:var(--accent)}
.tb-div{width:1px;height:16px;background:var(--ed-border);margin:0 5px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:3px}
.tb-btn[data-type]{font-size:12px;font-weight:700}

.editor-wrap{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--ed-border) transparent}
.editor-wrap::-webkit-scrollbar{width:5px}
.editor-wrap::-webkit-scrollbar-thumb{background:var(--ed-border);border-radius:3px}
.editor{max-width:700px;margin:0 auto;padding:44px 40px 120px}

.doc-meta{margin-bottom:28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.doc-tag{font-size:10.5px;color:var(--accent);background:var(--accent-sub);padding:3px 10px;border-radius:20px;font-weight:500}
.doc-date{font-size:10.5px;color:var(--ed-ph)}
.doc-kb-tag{font-size:10.5px;color:var(--ed-text2);background:var(--tag-bg);padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:4px}
.doc-kb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.block{position:relative;padding:3px 0;border-radius:var(--r-sm);transition:background .12s}
.block:hover{background:var(--accent-sub)}
.b-handle{position:absolute;left:-30px;top:50%;transform:translateY(-50%);width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;color:var(--ed-ph);font-size:13px;opacity:0;transition:var(--tr);cursor:grab;background:none;border:none}
.block:hover .b-handle{opacity:.5}
.b-handle:hover{opacity:1!important;background:var(--tag-bg)}
.b-add{position:absolute;left:-22px;top:50%;transform:translateY(-50%);width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;color:var(--ed-ph);font-size:15px;opacity:0;transition:var(--tr);cursor:pointer;background:none;border:none}
.block:hover .b-add{opacity:.5}
.b-add:hover{opacity:1!important;color:var(--accent)}
.b-content{outline:none;line-height:1.7;min-height:1.7em;word-break:break-word}
.b-content:empty::before{content:attr(data-ph);color:var(--ed-ph);pointer-events:none}
.bk-h1 .b-content{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:700;line-height:1.35;color:var(--ed-text);letter-spacing:-.5px}
.bk-h2 .b-content{font-family:'Noto Serif SC',serif;font-size:21px;font-weight:600;line-height:1.4;margin-top:6px}
.bk-h3 .b-content{font-size:16.5px;font-weight:600;line-height:1.5;color:#3a3a3c}
.bk-text .b-content{font-size:14.5px;color:#444;line-height:1.75}
.bk-quote{border-left:3px solid var(--accent);padding-left:14px;margin-left:2px}
.bk-quote .b-content{font-size:14px;color:var(--ed-text2);font-style:italic}
.bk-todo{display:flex;align-items:flex-start;gap:9px}
.todo-ck{width:17px;height:17px;border:2px solid var(--ed-border);border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:4px;transition:var(--tr);display:flex;align-items:center;justify-content:center;background:none;padding:0}
.todo-ck:hover{border-color:var(--accent)}
.todo-ck.ckd{background:var(--accent);border-color:var(--accent)}
.todo-ck.ckd::after{content:'';width:4px;height:7px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translate(-1px,-1px)}
.todo-ck.ckd+.b-content{text-decoration:line-through;color:var(--ed-ph)}
.bk-bullet{display:flex;align-items:flex-start;gap:7px}
.bul-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:10px}
.bk-div{padding:10px 0}
.bk-div hr{border:none;height:1px;background:var(--ed-border)}

.cursor-blink{display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:1px;vertical-align:text-bottom;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.doc-cover{width:100%;height:160px;border-radius:var(--r-lg);margin-bottom:24px;background:linear-gradient(135deg,#e8dfd4,#d4c5b2 40%,#c8b8a2 70%,#bfae96);position:relative;overflow:hidden}
.doc-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(250,249,247,.6))}
.doc-cover-pat{position:absolute;inset:0;opacity:.1;background-image:radial-gradient(circle at 20% 30%,#8a7a66 1px,transparent 1px),radial-gradient(circle at 80% 60%,#8a7a66 1px,transparent 1px),radial-gradient(circle at 50% 80%,#8a7a66 1px,transparent 1px);background-size:40px 40px,60px 60px,50px 50px}

.status-bar{height:30px;min-height:30px;background:var(--ed-surface);border-top:1px solid var(--ed-border);display:flex;align-items:center;padding:0 14px;gap:14px;font-size:10.5px;color:var(--ed-text2)}
.st-item{display:flex;align-items:center;gap:3px}
.st-item i{font-size:11px;opacity:.6}
.st-spacer{flex:1}
.st-dot{width:6px;height:6px;border-radius:50%;background:#5cb87a;box-shadow:0 0 5px rgba(92,184,122,.4)}

/* ====== 分享面板 ====== */
.share-ov{position:fixed;inset:0;background:rgba(0,0,0,.22);z-index:50;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;backdrop-filter:blur(2px)}
.share-ov.open{opacity:1;visibility:visible}
.share-drawer{position:fixed;top:0;right:0;bottom:0;width:410px;max-width:92vw;background:var(--ed-surface);z-index:60;transform:translateX(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.08)}
.share-drawer.open{transform:translateX(0)}
.sd-head{padding:22px 26px 18px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--ed-border)}
.sd-head h2{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:700;letter-spacing:-.3px}
.sd-head p{font-size:12.5px;color:var(--ed-text2);margin-top:3px}
.sd-close{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);border:none;background:none;color:var(--ed-text2);cursor:pointer;transition:var(--tr);font-size:15px;flex-shrink:0}
.sd-close:hover{background:var(--tag-bg);color:var(--ed-text)}
.sd-body{flex:1;overflow-y:auto;padding:22px 26px;scrollbar-width:thin;scrollbar-color:var(--ed-border) transparent}
.sd-body::-webkit-scrollbar{width:4px}
.sd-body::-webkit-scrollbar-thumb{background:var(--ed-border);border-radius:2px}

.share-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--tag-bg);border-radius:var(--r-md);margin-bottom:22px}
.stg-info{display:flex;align-items:center;gap:11px}
.stg-icon{width:38px;height:38px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:17px;transition:var(--tr)}
.stg-icon.off{background:var(--ed-border);color:var(--ed-text2)}
.stg-icon.on{background:var(--accent-sub);color:var(--accent)}
.stg-label{font-size:13.5px;font-weight:500}
.stg-desc{font-size:11.5px;color:var(--ed-text2);margin-top:1px}
.toggle-sw{width:42px;height:22px;border-radius:11px;background:var(--ed-border);cursor:pointer;position:relative;transition:background .25s;flex-shrink:0;border:none;padding:0}
.toggle-sw::after{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.toggle-sw.on{background:var(--accent)}
.toggle-sw.on::after{transform:translateX(20px)}

.share-content{display:none}
.share-content.visible{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sec-title{font-size:11px;font-weight:600;color:var(--ed-text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px}

.share-link-box{display:flex;align-items:center;border:1px solid var(--ed-border);border-radius:var(--r-md);overflow:hidden;margin-bottom:22px;transition:border-color var(--tr)}
.share-link-box:focus-within{border-color:var(--accent)}
.sl-input{flex:1;padding:9px 13px;font-size:12.5px;color:var(--ed-text);background:transparent;border:none;outline:none;font-family:'SF Mono','Fira Code',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sl-copy{padding:9px 14px;background:none;border:none;border-left:1px solid var(--ed-border);color:var(--accent);font-size:12.5px;font-weight:500;cursor:pointer;transition:var(--tr);font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:4px}
.sl-copy:hover{background:var(--accent-sub)}
.sl-copy.copied{color:var(--success)}
.sl-copy i{font-size:13px}

function toast(m,ic='icon-check-circle'){const t=document.createElement('div');t.className='toast';t.innerHTML=`<i class="${ic}"></i> ${m}`;document.getElementById('toastCt').appendChild(t);setTimeout(()=>t.remove(),2600)}
function genK(){const c='ABCDEFGHJKMNPQRSTUVWXYZ23456789';let k='';for(let i=0;i<8;i++){if(i===4)k+='-';k+=c[Math.floor(Math.random()*c.length)]}return k}
function genL(){return'https://note.app/s/'+Math.random().toString(36).substring(2,10)}
function fkb(id){return KBs.find(k=>k.id===id)}
function ftree(items,id){for(const it of items){if(it.id===id)return it;if(it.children){const r=ftree(it.children,id);if(r)return r}}return null}
function cntDocs(items){let c=0;for(const it of items){if(it.type==='doc')c++;if(it.children)c+=cntDocs(it.children)}return c}
function cntAll(items){return items.filter(i=>i.type==='doc').length+items.filter(i=>i.type==='dir').reduce((s,d)=>s+cntDocs(d.children||[]),0)}
function rmById(items,id){for(let i=0;i<items.length;i++){if(items[i].id===id){items.splice(i,1);return true}if(items[i].children&&rmById(items[i].children,id))return true}return false}
function collDocs(items){let d=[];for(const it of items){if(it.type==='doc')d.push(it);if(it.children)d=d.concat(collDocs(it.children))}return d}
function findParent(items,id,p){for(const it of items){if(it.id===id)return p;if(it.children){const r=findParent(it.children,id,it);if(r)return r}}return null}

const kbListView=document.getElementById('kbListView');
const kbTreeView=document.getElementById('kbTreeView');
const newDirBtn=document.getElementById('newDirBtn');
const newDocBtn=document.getElementById('newDocBtn');

function showKBList(){
  curKB=null;
  kbListView.style.display='flex';
  kbTreeView.classList.remove('active');
  newDirBtn.classList.add('hidden');
  newDocBtn.classList.add('hidden');
  renderKBGrid();
  // 不清除编辑器，保持当前文档
}

function showKBTree(kbId){
  curKB=kbId;
  kbListView.style.display='none';
  kbTreeView.classList.add('active');
  newDirBtn.classList.remove('hidden');
  newDocBtn.classList.remove('hidden');
  const kb=fkb(kbId);
  document.getElementById('kbTreeIcon').style.background=kb.color;
  document.getElementById('kbTreeIcon').innerHTML=`<i class="${kb.icon}"></i>`;
  document.getElementById('kbTreeLabel').textContent=kb.name;
  document.getElementById('kbTreeDesc').textContent=kb.desc||cntDocs(kb.children)+' 篇文档';
  renderTree();
}

document.getElementById('kbBackBtn').addEventListener('click',showKBList);

// ===== 知识库网格 =====
function renderKBGrid(){
  const grid=document.getElementById('kbGrid');
  if(!KBs.length){grid.innerHTML='<div class="kb-list-empty"><i class="icon-book-open"></i><p>还没有知识库<br>点击右上角「新建」创建第一个</p></div>';return}
  grid.innerHTML=KBs.map(kb=>`
    <div class="kb-card" data-kid="${kb.id}">
      <div class="kb-card-bar" style="background:${kb.color}"></div>
      <div class="kb-card-icon" style="background:${kb.color}"><i class="${kb.icon}"></i></div>
      <div class="kb-card-info">
        <div class="kb-card-name">${kb.name}</div>
        <div class="kb-card-meta"><span><i class="icon-file-text"></i> ${cntDocs(kb.children)} 篇</span>${kb.desc?`<span>· ${kb.desc}</span>`:''}</div>
      </div>
      <i class="icon-chevron-right kb-card-arrow"></i>
    </div>
  `).join('');
  grid.querySelectorAll('.kb-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const kbId=card.dataset.kid;
      showKBTree(kbId);
      // 如果没有当前文档或是其他知识库的文档，自动选第一个
      const kb=fkb(kbId);
      const firstDoc=collDocs(kb.children)[0];
      if(firstDoc){curDoc=firstDoc.id;ensureTab(firstDoc.id,firstDoc.name,kbId)}
      renderTabs();renderEditor();
      toast(`进入「${kb.name}」`,'icon-book-open');
    });
    // 右键
    card.addEventListener('contextmenu',e=>{
      e.preventDefault();
      const cm=document.getElementById('ctxMenu');
      cm.innerHTML=`<div class="ctx-item" data-act="rename-kb"><i class="icon-edit-3"></i> 重命名</div><div class="ctx-sep"></div><div class="ctx-item" data-act="del-kb" style="color:var(--danger)"><i class="icon-trash-2" style="color:var(--danger)"></i> 删除知识库</div>`;
      cm.classList.add('show');
      cm.style.left=Math.min(e.clientX,innerWidth-180)+'px';
      cm.style.top=Math.min(e.clientY,innerHeight-120)+'px';
      cm._kbId=card.dataset.kid;
    });
  });
}

// ===== 目录树 =====
function renderTree(){
  const kb=fkb(curKB);if(!kb)return;
  const tree=document.getElementById('sbTree');
  if(!kb.children.length){tree.innerHTML='<div class="tree-empty"><i class="icon-folder-open"></i><p>此知识库为空<br>点击下方按钮新建目录或文档</p></div>';return}
  tree.innerHTML=rTreeItems(kb.children);
  bindTreeEvts(tree);
}

function rTreeItems(items){
  return items.map(it=>{
    if(it.type==='dir'){
      const c=cntAll(it.children||[]);
      return `<div class="tree-dir" data-id="${it.id}"><div class="tree-item" data-id="${it.id}" data-type="dir"><span class="tree-chev ${it.open?'open':''}"><i class="icon-chevron-right"></i></span><span class="tree-ico dir"><i class="icon-folder${it.open?'-open':''}"></i></span><span class="tree-lbl">${it.name}</span><span class="tree-cnt">${c}</span></div><div class="tree-ch ${it.open?'open':''}">${it.children?rTreeItems(it.children):''}</div></div>`;
    }
    return `<div class="tree-item ${it.id===curDoc?'active':''}" data-id="${it.id}" data-type="doc"><span class="tree-chev hidden"><i class="icon-chevron-right"></i></span><span class="tree-ico doc"><i class="icon-file-text"></i></span><span class="tree-lbl">${it.name}</span></div>`;
  }).join('');
}

function bindTreeEvts(container){
  container.querySelectorAll('.tree-item[data-type="dir"]').forEach(el=>{
    el.addEventListener('click',()=>{
      const dir=ftree(fkb(curKB).children,el.dataset.id);
      if(dir){dir.open=!dir.open;renderTree()}
    });
    el.addEventListener('contextmenu',e=>{
      e.preventDefault();
      const cm=document.getElementById('ctxMenu');
      cm.innerHTML=`<div class="ctx-item" data-act="ren-dir"><i class="icon-edit-3"></i> 重命名</div><div class="ctx-sep"></div><div class="ctx-item" data-act="del-dir" style="color:var(--danger)"><i class="icon-trash-2" style="color:var(--danger)"></i> 删除目录</div>`;
      cm.classList.add('show');cm.style.left=Math.min(e.clientX,innerWidth-180)+'px';cm.style.top=Math.min(e.clientY,innerHeight-120)+'px';cm._tid=el.dataset.id;
    });
  });
  container.querySelectorAll('.tree-item[data-type="doc"]').forEach(el=>{
    el.addEventListener('click',()=>{
      const doc=ftree(fkb(curKB).children,el.dataset.id);
      if(doc){curDoc=doc.id;ensureTab(doc.id,doc.name,curKB);renderTabs();renderEditor()}
    });
    el.addEventListener('contextmenu',e=>{
      e.preventDefault();
      const cm=document.getElementById('ctxMenu');
      cm.innerHTML=`<div class="ctx-item" data-act="ren-doc"><i class="icon-edit-3"></i> 重命名</div><div class="ctx-sep"></div><div class="ctx-item" data-act="del-doc" style="color:var(--danger)"><i class="icon-trash-2" style="color:var(--danger)"></i> 删除</div>`;
      cm.classList.add('show');cm.style.left=Math.min(e.clientX,innerWidth-180)+'px';cm.style.top=Math.min(e.clientY,innerHeight-120)+'px';cm._tid=el.dataset.id;
    });
  });
}

// 右键菜单统一处理
document.getElementById('ctxMenu').addEventListener('click',e=>{
  const item=e.target.closest('.ctx-item');if(!item)return;
  const act=item.dataset.act;const cm=document.getElementById('ctxMenu');cm.classList.remove('show');

  if(act==='del-doc'){
    const kb=fkb(curKB);rmById(kb.children,cm._tid);
    openTabs=openTabs.filter(t=>t.id!==cm._tid);
    if(curDoc===cm._tid){const f=collDocs(kb.children)[0];curDoc=f?f.id:null}
    renderTree();renderTabs();renderEditor();toast('文档已删除','icon-trash-2');
  } else if(act==='del-dir'){
    const kb=fkb(curKB);rmById(kb.children,cm._tid);
    if(!collDocs(kb.children).find(d=>d.id===curDoc)){const f=collDocs(kb.children)[0];curDoc=f?f.id:null}
    renderTree();renderTabs();renderEditor();toast('目录已删除','icon-trash-2');
  } else if(act==='ren-doc'||act==='ren-dir'){
    const el=document.querySelector(`.tree-item[data-id="${cm._tid}"] .tree-lbl`);if(!el)return;
    const old=el.textContent;const inp=document.createElement('input');inp.className='tree-inline-input';inp.value=old;inp.type='text';
    el.replaceWith(inp);inp.focus();inp.select();
    const done=()=>{const v=inp.value.trim();if(v){const node=ftree(fkb(curKB).children,cm._tid);if(node){node.name=v;const tab=openTabs.find(t=>t.id===cm._tid);if(tab)tab.name=v}}renderTree();renderTabs()};
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')done();if(e.key==='Escape'){renderTree();renderTabs()}});
    inp.addEventListener('blur',done);
  } else if(act==='rename-kb'){
    const card=document.querySelector(`.kb-card[data-kid="${cm._kbId}"] .kb-card-name`);if(!card)return;
    const old=card.textContent;const inp=document.createElement('input');inp.className='tree-inline-input';inp.value=old;inp.type='text';
    inp.style.fontSize='13.5px';inp.style.fontWeight='600';inp.style.color='#dddde0';inp.style.background='var(--sb-bg)';
    card.replaceWith(inp);inp.focus();inp.select();
    const done=()=>{const v=inp.value.trim();if(v){const kb=fkb(cm._kbId);if(kb)kb.name=v}renderKBGrid()};
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')done();if(e.key==='Escape')renderKBGrid()});
    inp.addEventListener('blur',done);
  } else if(act==='del-kb'){
    const idx=KBs.findIndex(k=>k.id===cm._kbId);
    if(idx>-1){
      const name=KBs[idx].name;
      // 清理相关标签页
      openTabs=openTabs.filter(t=>t.kbId!==cm._kbId);
      if(!openTabs.length)curDoc=null;
      else if(!openTabs.find(t=>t.id===curDoc))curDoc=openTabs[openTabs.length-1].id;
      if(curKB===cm._kbId)showKBList();
      KBs.splice(idx,1);
      renderKBGrid();renderTabs();renderEditor();toast(`已删除知识库「${name}」`,'icon-trash-2');
    }
  }
});

// ===== 标签页 =====
function ensureTab(id,name,kbId){if(!openTabs.find(t=>t.id===id))openTabs.push({id,name,kbId:kbId||curKB})}
function renderTabs(){
  const bar=document.getElementById('tabBar');const tog=bar.querySelector('.mob-toggle');
  bar.innerHTML='';bar.appendChild(tog);
  openTabs.forEach(tab=>{
    const el=document.createElement('div');el.className='tab'+(tab.id===curDoc?' active':'');el.dataset.tab=tab.id;
    el.innerHTML=`<span class="t-icon"><i class="icon-file-text"></i></span><span>${tab.name}</span>${tab.id!==curDoc?'<span class="t-dot"></span>':''}<button class="t-close"><i class="icon-x"></i></button>`;
    el.addEventListener('click',e=>{if(e.target.closest('.t-close'))return;curDoc=tab.id;
      // 切换到对应知识库视图
      if(tab.kbId&&curKB!==tab.kbId)showKBTree(tab.kbId);
      renderTabs();renderEditor()});
    el.querySelector('.t-close').addEventListener('click',e=>{e.stopPropagation();openTabs=openTabs.filter(t=>t.id!==tab.id);if(curDoc===tab.id){curDoc=openTabs.length?openTabs[openTabs.length-1].id:null}renderTabs();renderEditor();toast('标签页已关闭','icon-x-circle')});
    bar.appendChild(el);
  });
}

    else if(act==='h2'){b.className='block bk-h2';toast('已转为标题 2','icon-repeat')}
    else if(act==='txt'){b.className='block bk-text';toast('已转为正文','icon-repeat')}
    else if(act==='bul'){b.className='block bk-bullet';if(!b.querySelector('.bul-dot')){const d=document.createElement('span');d.className='bul-dot';b.insertBefore(d,b.querySelector('.b-content'))}toast('已转为列表','icon-repeat')}
    cm._block=null;
  }
  cm.classList.remove('show');
});

// ===== 搜索 =====
document.getElementById('searchInput').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();if(!q){if(curKB)renderTree();else renderKBGrid();return}
  // 全局搜索所有知识库
  const results=[];
  for(const kb of KBs){const docs=collDocs(kb.children).filter(d=>d.name.toLowerCase().includes(q));docs.forEach(d=>results.push({doc:d,kb}))}
  // 如果在知识库内，显示该知识库搜索结果
  if(curKB){
    const kb=fkb(curKB);const docs=collDocs(kb.children).filter(d=>d.name.toLowerCase().includes(q));
    const tree=document.getElementById('sbTree');
    if(!docs.length){tree.innerHTML='<div class="tree-empty"><i class="icon-search"></i><p>未找到匹配文档</p></div>';return}
    tree.innerHTML=docs.map(d=>`<div class="tree-item ${d.id===curDoc?'active':''}" data-id="${d.id}" data-type="doc" data-search="1"><span class="tree-chev hidden"><i class="icon-chevron-right"></i></span><span class="tree-ico doc"><i class="icon-file-text"></i></span><span class="tree-lbl">${d.name}</span></div>`).join('');
    tree.querySelectorAll('.tree-item').forEach(el=>{el.addEventListener('click',()=>{curDoc=el.dataset.id;ensureTab(curDoc,ftree(fkb(curKB).children,curDoc).name,curKB);renderTabs();renderEditor()})});
  } else {
    // 知识库列表视图：显示搜索结果
    const grid=document.getElementById('kbGrid');
    if(!results.length){grid.innerHTML='<div class="kb-list-empty"><i class="icon-search"></i><p>未找到匹配文档</p></div>';return}
    grid.innerHTML=results.map(r=>`
      <div class="kb-card" data-kid="${r.kb.id}" data-did="${r.doc.id}">
        <div class="kb-card-bar" style="background:${r.kb.color}"></div>
        <div class="kb-card-icon" style="background:${r.kb.color}"><i class="icon-file-text"></i></div>
        <div class="kb-card-info">
          <div class="kb-card-name">${r.doc.name}</div>
          <div class="kb-card-meta"><span><i class="icon-book-open"></i> ${r.kb.name}</span></div>
        </div>
        <i class="icon-chevron-right kb-card-arrow"></i>
      </div>
    `).join('');
    grid.querySelectorAll('.kb-card').forEach(card=>{
      card.addEventListener('click',()=>{
        const kbId=card.dataset.kid;const docId=card.dataset.did;
        showKBTree(kbId);curDoc=docId;
        const doc=ftree(fkb(kbId).children,docId);
        if(doc)ensureTab(docId,doc.name,kbId);
        renderTabs();renderEditor();
      });
    });
  }
});

// ===== 工具栏 =====
document.querySelectorAll('.tb-btn[data-type]').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.tb-btn[data-type]').forEach(b=>b.classList.remove('active'));btn.classList.add('active')})});
document.querySelectorAll('.tb-btn:not([data-type]):not(#shareBtn)').forEach(btn=>{btn.addEventListener('click',()=>btn.classList.toggle('active'))});

// ===== 分享 =====
const shareOv=document.getElementById('shareOv'),shareDrawer=document.getElementById('shareDrawer');
function openShare(){shareOv.classList.add('open');shareDrawer.classList.add('open')}
function closeShare(){shareOv.classList.remove('open');shareDrawer.classList.remove('open')}
document.getElementById('shareBtn').addEventListener('click',openShare);
document.getElementById('shareClose').addEventListener('click',closeShare);
document.getElementById('shareCancelBtn').addEventListener('click',closeShare);
shareOv.addEventListener('click',closeShare);

document.getElementById('shareToggle').addEventListener('click',function(){shareOn=!shareOn;this.classList.toggle('on',shareOn);document.getElementById('stgIcon').className='stg-icon '+(shareOn?'on':'off');document.getElementById('stgLabel').textContent=shareOn?'分享已开启':'启用分享';document.getElementById('stgDesc').textContent=shareOn?'拥有链接的人可以访问此文档':'关闭后链接将立即失效';document.getElementById('shareContent').classList.toggle('visible',shareOn);if(shareOn)document.getElementById('shareLink').value=genL()});
document.getElementById('slCopy').addEventListener('click',function(){const l=document.getElementById('shareLink').value;if(!l)return;navigator.clipboard.writeText(l).then(()=>{this.innerHTML='<i class="icon-check"></i> 已复制';this.classList.add('copied');toast('分享链接已复制','icon-link');setTimeout(()=>{this.innerHTML='<i class="icon-copy"></i> 复制';this.classList.remove('copied')},2000)}).catch(()=>{toast('分享链接已复制','icon-link');this.innerHTML='<i class="icon-check"></i> 已复制';this.classList.add('copied');setTimeout(()=>{this.innerHTML='<i class="icon-copy"></i> 复制';this.classList.remove('copied')},2000)})});
document.querySelectorAll('.mode-tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');shareMode=tab.dataset.mode;document.querySelectorAll('.mode-panel').forEach(p=>p.classList.remove('active'));document.getElementById('m'+shareMode.charAt(0).toUpperCase()+shareMode.slice(1)).classList.add('active')})});

const accSi=document.getElementById('accSi'),accSg=document.getElementById('accSg'),accAddBtn=document.getElementById('accAddBtn');
accSi.addEventListener('input',()=>{const q=accSi.value.trim().toLowerCase();selSgUser=null;accAddBtn.disabled=true;if(!q){accSg.classList.remove('show');return}const added=new Set(addedAccs.map(a=>a.id));const res=mockUsers.filter(u=>!added.has(u.id)&&(u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q)));if(!res.length){accSg.innerHTML='<div class="acc-sg-empty">未找到匹配用户</div>'}else{accSg.innerHTML=res.map(u=>`<div class="acc-sg-item" data-uid="${u.id}"><div class="acc-sg-av" style="background:${u.color}">${u.name[0]}</div><div><div class="acc-sg-name">${u.name}</div><div class="acc-sg-email">${u.email}</div></div></div>`).join('');accSg.querySelectorAll('.acc-sg-item').forEach(el=>{el.addEventListener('click',()=>{selSgUser=mockUsers.find(u=>u.id===el.dataset.uid);accSi.value=selSgUser.name;accAddBtn.disabled=false;accSg.classList.remove('show')})})}accSg.classList.add('show')});
accSi.addEventListener('focus',()=>{if(accSi.value.trim())accSi.dispatchEvent(new Event('input'))});
accAddBtn.addEventListener('click',()=>{if(!selSgUser)return;addedAccs.push({...selSgUser,role:'可查看'});selSgUser=null;accSi.value='';accAddBtn.disabled=true;renderAccList();toast(`已添加「${addedAccs[addedAccs.length-1].name}」`,'icon-user-check')});
accSi.addEventListener('keydown',e=>{if(e.key==='Enter'&&!accAddBtn.disabled)accAddBtn.click()});
function renderAccList(){const list=document.getElementById('accList'),empty=document.getElementById('accEmpty');if(!addedAccs.length){list.innerHTML='';empty.style.display='';return}empty.style.display='none';list.innerHTML=addedAccs.map((a,i)=>`<div class="acc-item"><div class="acc-av" style="background:${a.color}">${a.name[0]}</div><div class="acc-info"><div class="acc-name">${a.name}</div><div class="acc-email">${a.email}</div></div><button class="acc-role" data-i="${i}">${a.role}</button><button class="acc-rm" data-i="${i}"><i class="icon-x"></i></button></div>`).join('');list.querySelectorAll('.acc-role').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();const i=parseInt(btn.dataset.i);const dd=document.getElementById('roleDd');const r=btn.getBoundingClientRect();dd.style.top=(r.bottom+4)+'px';dd.style.left=r.left+'px';dd.querySelectorAll('.role-dd-item').forEach(it=>it.classList.toggle('cur',it.dataset.role===addedAccs[i].role));dd.classList.add('show');dd.querySelectorAll('.role-dd-item').forEach(it=>{it.onclick=()=>{addedAccs[i].role=it.dataset.role;renderAccList();dd.classList.remove('show');toast(`已将「${addedAccs[i].name}」设为${it.dataset.role}`,'icon-shield-check')}})})});list.querySelectorAll('.acc-rm').forEach(btn=>{btn.addEventListener('click',()=>{const i=parseInt(btn.dataset.i);const n=addedAccs[i].name;addedAccs.splice(i,1);renderAccList();toast(`已移除「${n}」`,'icon-user-x')})})}

const skVal=document.getElementById('skVal');
function updateSk(){skVal.textContent=secretVis?secretKey:'••••••••';skVal.classList.toggle('sk-hidden',!secretVis);document.getElementById('skToggle').innerHTML=secretVis?'<i class="icon-eye-off"></i>':'<i class="icon-eye"></i>'}
document.getElementById('skToggle').addEventListener('click',()=>{secretVis=!secretVis;updateSk()});
document.getElementById('skCopy').addEventListener('click',()=>{navigator.clipboard.writeText(secretKey).then(()=>{toast('秘钥已复制','icon-key-round');const b=document.getElementById('skCopy');b.innerHTML='<i class="icon-check"></i>';setTimeout(()=>{b.innerHTML='<i class="icon-copy"></i>'},1500)}).catch(()=>toast('秘钥已复制','icon-key-round'))});
document.getElementById('skRegen').addEventListener('click',()=>{secretKey=genK();secretVis=false;updateSk();toast('秘钥已重新生成，旧秘钥将失效','icon-refresh-cw')});
document.querySelectorAll('.exp-opt').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.exp-opt').forEach(b=>b.classList.remove('active'));btn.classList.add('active');expireOpt=btn.dataset.exp;const l={'1h':'1 小时','24h':'24 小时','7d':'7 天','30d':'30 天','never':'永不过期'};toast(`过期时间设为「${l[expireOpt]}」`,'icon-clock')})});
document.getElementById('shareSaveBtn').addEventListener('click',()=>{if(!shareOn){toast('请先启用分享开关','icon-alert-circle');return}const l={public:'公开',account:'指定账号',secret:'秘钥访问'};shareHist.unshift({mode:l[shareMode],time:new Date().toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(/\//g,'-'),active:true});if(shareHist.length>1)shareHist[1].active=false;renderHist();toast('分享设置已保存','icon-check-circle');closeShare()});
function renderHist(){const list=document.getElementById('histList');if(!shareHist.length){document.getElementById('shareHist').style.display='none';return}document.getElementById('shareHist').style.display='';list.innerHTML=shareHist.map((h,i)=>`<div class="sh-item"><span class="sh-dot ${h.active?'on':'off'}"></span><div class="sh-info"><div class="sh-mode">${h.mode}${h.active?' (当前)':''}</div><div class="sh-time">${h.time}</div></div>${!h.active?'<span style="font-size:11.5px;color:var(--ed-text2);padding:3px 7px">已失效</span>':'<button class="sh-revoke" data-i="'+i+'" style="color:var(--ed-text2)">撤销</button>'}</div>`).join('');list.querySelectorAll('.sh-revoke').forEach(btn=>{btn.addEventListener('click',()=>{shareHist[parseInt(btn.dataset.i)].active=false;renderHist();toast('已撤销此分享链接','icon-unlink')})})}
renderHist();

// 全局点击关闭
document.addEventListener('click',e=>{if(!e.target.closest('#mAccount'))document.getElementById('accSg').classList.remove('show');if(!e.target.closest('.role-dd')&&!e.target.closest('.acc-role'))document.getElementById('roleDd').classList.remove('show')});

// 侧边栏拖拽
const resizeHandle=document.getElementById('resizeHandle'),sidebar=document.getElementById('sidebar');let isR=false;
resizeHandle.addEventListener('mousedown',()=>{isR=true;document.body.style.cursor='col-resize';document.body.style.userSelect='none'});
document.addEventListener('mousemove',e=>{if(!isR)return;const w=Math.max(200,Math.min(440,e.clientX));sidebar.style.width=w+'px';sidebar.style.minWidth=w+'px'});
document.addEventListener('mouseup',()=>{if(isR){isR=false;document.body.style.cursor='';document.body.style.userSelect=''}});
document.getElementById('mobToggle').addEventListener('click',()=>sidebar.classList.toggle('mob-open'));
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus()}if(e.key==='Escape'){closeShare()}});

// ===== 初始渲染 =====
renderKBGrid();
renderTabs();
renderEditor();
</script>
