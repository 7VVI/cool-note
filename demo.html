.md-body{font-size:15px;line-height:1.8;color:#37352F;word-break:break-word}
.md-body h1{font-size:1.875em;font-weight:800;margin:.6em 0 .4em;letter-spacing:-.02em;line-height:1.3}
.md-body h2{font-size:1.45em;font-weight:700;margin:.7em 0 .35em;letter-spacing:-.01em;padding-bottom:.25em;border-bottom:1px solid #E9E9E7;line-height:1.35}

.md-body p{margin:.35em 0}

.md-body th{background:#F7F7F5;font-weight:600}
.md-body td{color:#5C5B58}
.md-body hr{border:none;border-top:1px solid #E9E9E7;margin:.8em 0}
.md-body img{max-width:100%;border-radius:8px;margin:.5em 0}

.blk-render:hover{background:#FDF8F4;border-radius:6px;cursor:text}
.blk-ta{font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.75;tab-size:2;resize:none;caret-color:#CB7B4B;outline:none}

.toc-i:hover{color:#37352F;background:#F7F7F5}

.ov{position:fixed;inset:0;background:rgba(55,53,47,.28);backdrop-filter:blur(2px);z-index:50}
